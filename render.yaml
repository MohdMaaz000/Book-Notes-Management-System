services:
  - type: web
    name: book-notes-management-system
    runtime: python
    rootDir: backend
    healthCheckPath: /api/v1/health
    buildCommand: pip install -r requirements.txt
    startCommand: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
    autoDeploy: true
    envVars:
      - key: APP_NAME
        value: Book & Notes Management System
      - key: ENVIRONMENT
        value: production
      - key: API_V1_PREFIX
        value: /api/v1
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: book-notes-management-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXP_MINUTES
        value: 15
      - key: JWT_REFRESH_EXP_DAYS
        value: 7
      - key: JWT_ALGORITHM
        value: HS256
      - key: REFRESH_COOKIE_NAME
        value: book_notes_refresh_token
      - key: BCRYPT_ROUNDS
        value: 12
      - key: CORS_ORIGINS
        sync: false
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: 900
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 200
      - key: AUTH_RATE_LIMIT_MAX_REQUESTS
        value: 20

databases:
  - name: book-notes-management-db
    plan: free
