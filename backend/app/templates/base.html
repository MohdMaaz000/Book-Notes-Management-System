<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title or app_name }}</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <a class="brand" href="{{ '/books' if current_user else '/' }}">
                <span class="brand-mark">TM</span>
                <span>{{ app_name }}</span>
            </a>
            <nav class="site-nav">
                {% if current_user %}
                    <span class="nav-user">{{ current_user.name }}</span>
                    <a href="/books">Books</a>
                    <form method="post" action="/logout">
                        <button class="ghost-button" type="submit">Logout</button>
                    </form>
                {% else %}
                    <a href="/login">Login</a>
                    <a class="primary-link" href="/register">Get Started</a>
                {% endif %}
            </nav>
        </header>
        <main>
            {% if flash_messages %}
                <section class="flash-stack" aria-live="polite">
                    {% for flash in flash_messages %}
                        <div class="alert {{ 'success-alert' if flash.category == 'success' else 'error-alert' }}">{{ flash.message }}</div>
                    {% endfor %}
                </section>
            {% endif %}
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
